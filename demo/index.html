    <!-- Heroicons (SVG inline, no extra CDN needed) -->

    <style>
        .currentRow {
            background-color: #fef9c3;
            border: 1px solid #facc15;
            border-radius: 0.375rem;

            padding: 0.75rem 1rem;
            font-size: 1.25rem;
            font-weight: 600;

            transform: scale(1.05);
            transition: all 0.15s ease;
        }

        tfoot tr {
            background-color: #fff8dc;
        }

        tfoot tr:has(input:focus) {
            background-color: #ffe082;
        }

        input:focus {
            outline: none;
            border: 2px solid #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.3);
        }

        mark {
            background-color: yellow;
            color: black;
        }

        .active svg {
            stroke: #3b82f6;
            /* Example color */
        }

        .active span {
            color: #3b82f6;
            /* Example color */
        }

        .danger svg {
            stroke: #c41d14;
            /* Example color */
        }

        .danger span {
            color: #c41d14;
            /* Example color */
        }
    </style>

    <style>
        @media print {

            .table-responsive,
            .overflow-auto,
            .overflow-x-auto {
                overflow: visible !important;
            }

            table {
                width: 100% !important;
            }

            tfoot tr:first-child {
                display: none;
            }

            table th:last-child,
            table td:last-child {
                display: none;
            }

            header,
            #header,
            ks-nav {
                display: none !important;
            }
        }
    </style>

    <style>
        /* Stack ks-input elements vertically */
        .verticalForm ks-input>div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
            /* equivalent to gap-1 */
        }

        /* Stack ks-datalist-input elements vertically */
        .verticalForm ks-datalist-input>div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
            /* equivalent to gap-1 */
        }

        /* Style labels inside the form */
        .verticalForm label {
            width: 100%;
            text-align: left;
        }
    </style>
</head>

    <script>
        const btn = document.getElementById("moreBtn");
        const menu = document.getElementById("moreMenu");

        btn.onclick = () => {
            menu.classList.toggle("hidden");
        };

        document.addEventListener("click", (e) => {
            if (!btn.parentElement.contains(e.target)) {
                menu.classList.add("hidden");
            }
        });
    </script>
