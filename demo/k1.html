<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeshavSoft8</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- <link rel="stylesheet" href="./tailwind-3.css"> -->

    <!-- Heroicons (SVG inline, no extra CDN needed) -->

    <style>
        .currentRow {
            background-color: #fef9c3;
            border: 1px solid #facc15;
            border-radius: 0.375rem;

            padding: 0.75rem 1rem;
            font-size: 1.25rem;
            font-weight: 600;

            transform: scale(1.05);
            transition: all 0.15s ease;
        }

        tfoot tr {
            background-color: #fff8dc;
        }

        tfoot tr:has(input:focus) {
            background-color: #ffe082;
        }

        input:focus {
            outline: none;
            border: 2px solid #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.3);
        }

        mark {
            background-color: yellow;
            color: black;
        }

        .active svg {
            stroke: #3b82f6;
            /* Example color */
        }

        .active span {
            color: #3b82f6;
            /* Example color */
        }

        .danger svg {
            stroke: #c41d14;
            /* Example color */
        }

        .danger span {
            color: #c41d14;
            /* Example color */
        }
    </style>

    <style>
        @media print {

            .table-responsive,
            .overflow-auto,
            .overflow-x-auto {
                overflow: visible !important;
            }

            table {
                width: 100% !important;
            }

            tfoot tr:first-child {
                display: none;
            }

            table th:last-child,
            table td:last-child {
                display: none;
            }

            header,
            #header,
            ks-nav {
                display: none !important;
            }
        }
    </style>

    <style>
        /* Stack ks-input elements vertically */
        .verticalForm ks-input>div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
            /* equivalent to gap-1 */
        }

        /* Stack ks-datalist-input elements vertically */
        .verticalForm ks-datalist-input>div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
            /* equivalent to gap-1 */
        }

        /* Style labels inside the form */
        .verticalForm label {
            width: 100%;
            text-align: left;
        }
    </style>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">


    <header class="bg-gray-900 text-white sticky top-0 z-50 shadow-md">

        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-between">

                <!-- Logo Section -->
                <div class="flex-shrink-0">
                    <a href="#" class="text-xl font-bold tracking-wider text-indigo-400">BRANDLOGO</a>
                </div>

                <!-- Desktop Navigation Links -->
                <nav class="hidden md:flex space-x-8 items-center">
                    <a href="#" class="text-gray-300 hover:text-white transition-colors duration-200">Home</a>
                    <a href="#" class="text-gray-300 hover:text-white transition-colors duration-200">About</a>

                    <!-- Dropdown Menu Container (Hover Trigger) -->
                    <div class="relative group">
                        <button
                            class="flex items-center gap-1 text-gray-300 group-hover:text-white transition-colors duration-200 focus:outline-none py-5">
                            <span>Services</span>
                            <!-- Arrow Icon -->
                            <svg class="h-4 w-4 transition-transform duration-200 group-hover:rotate-180"
                                xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                            </svg>
                        </button>

                        <!-- Dropdown Content Hidden by Default, Displayed on Group Hover -->
                        <div
                            class="absolute left-0 top-full hidden group-hover:block w-48 rounded-md bg-white py-2 shadow-xl ring-1 ring-black ring-opacity-5 transition-all duration-200">
                            <a href="#"
                                class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600">Web
                                Design</a>
                            <a href="#"
                                class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600">SEO
                                Marketing</a>
                            <a href="#"
                                class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600">Cloud
                                Hosting</a>
                        </div>
                    </div>

                    <a href="#" class="text-gray-300 hover:text-white transition-colors duration-200">Contact</a>
                </nav>

                <!-- Action Button / CTA -->
                <div class="hidden md:block">
                    <a href="#"
                        class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 transition-colors duration-200">Get
                        Started</a>
                </div>

                <!-- Mobile Hamburger Button -->
                <div class="flex md:hidden">
                    <button id="mobile-menu-btn" type="button"
                        class="inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-gray-800 hover:text-white focus:outline-none">
                        <svg class="h-6 w-6" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                    </button>
                </div>

            </div>
        </div>

        <!-- Mobile Dropdown Menu Drawer -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-800 bg-gray-900 px-4 py-3 space-y-3">
            <a href="#" class="block text-base font-medium text-gray-300 hover:text-white">Home</a>
            <a href="#" class="block text-base font-medium text-gray-300 hover:text-white">About</a>

            <!-- Mobile Services Accordion Stack -->
            <div class="space-y-1 pl-2 border-l-2 border-gray-700">
                <p class="text-xs font-semibold tracking-wider text-gray-500 uppercase">Services</p>
                <a href="#" class="block text-sm text-gray-400 hover:text-white">Web Design</a>
                <a href="#" class="block text-sm text-gray-400 hover:text-white">SEO Marketing</a>
                <a href="#" class="block text-sm text-gray-400 hover:text-white">Cloud Hosting</a>
            </div>

            <a href="#" class="block text-base font-medium text-gray-300 hover:text-white">Contact</a>
            <a href="#"
                class="block w-full text-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500">Get
                Started</a>
        </div>
    </header>

    <script>
        // Simple JavaScript to handle the responsive mobile menu toggle
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>
</body>

</html>
