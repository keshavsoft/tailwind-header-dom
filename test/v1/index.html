<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeshavSoft8</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- <link rel="stylesheet" href="./tailwind-3.css"> -->

    <!-- Heroicons (SVG inline, no extra CDN needed) -->

    <style>
        .currentRow {
            background-color: #fef9c3;
            border: 1px solid #facc15;
            border-radius: 0.375rem;

            padding: 0.75rem 1rem;
            font-size: 1.25rem;
            font-weight: 600;

            transform: scale(1.05);
            transition: all 0.15s ease;
        }

        tfoot tr {
            background-color: #fff8dc;
        }

        tfoot tr:has(input:focus) {
            background-color: #ffe082;
        }

        input:focus {
            outline: none;
            border: 2px solid #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.3);
        }

        mark {
            background-color: yellow;
            color: black;
        }

        .active svg {
            stroke: #3b82f6;
            /* Example color */
        }

        .active span {
            color: #3b82f6;
            /* Example color */
        }

        .danger svg {
            stroke: #c41d14;
            /* Example color */
        }

        .danger span {
            color: #c41d14;
            /* Example color */
        }
    </style>

    <style>
        @media print {

            .table-responsive,
            .overflow-auto,
            .overflow-x-auto {
                overflow: visible !important;
            }

            table {
                width: 100% !important;
            }

            tfoot tr:first-child {
                display: none;
            }

            table th:last-child,
            table td:last-child {
                display: none;
            }

            header,
            #header,
            ks-nav {
                display: none !important;
            }
        }
    </style>

    <style>
        /* Stack ks-input elements vertically */
        .verticalForm ks-input>div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
            /* equivalent to gap-1 */
        }

        /* Stack ks-datalist-input elements vertically */
        .verticalForm ks-datalist-input>div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.25rem;
            /* equivalent to gap-1 */
        }

        /* Style labels inside the form */
        .verticalForm label {
            width: 100%;
            text-align: left;
        }
    </style>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">
    <main class="flex-grow">
        <!-- NAVBAR -->

        <div id="header"></div>


        <!-- body -->
        <section class="mx-auto px-3 py-6 
                max-w-3xl 
                lg:max-w-5xl 
                xl:max-w-6xl">

            <!-- Table container -->

            <div id="kSHeadContainer">
            </div>

            <div id="kSTableContainer">
            </div>

            <div id="kSVerticalContainer">
            </div>
        </section>



    </main>
    <footer class="bg-gray-200 text-gray-700 text-center py-4">
        <div class="max-w-6xl mx-auto px-4">
            © 2026 KeshavSoft • v-20 </div>
    </footer>

    <!-- Login Modal -->

    <!-- Modal -->
    <div id="loginModal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center">

        <div id="loginModalContent" class="bg-white rounded-lg shadow-lg w-full max-w-sm p-6">

            <h2 class="text-xl font-semibold mb-4">
                Login
            </h2>

            <input type="text" placeholder="Username" id="Username" class="w-full border rounded px-3 py-2 mb-3">

            <input type="password" placeholder="Password" id="Password" class="w-full border rounded px-3 py-2 mb-2">

            <p id="loginError" class="hidden text-red-600 text-sm mb-3">
            </p>

            <button class="w-full bg-blue-600 text-white py-2 rounded" id="loginButtonId">
                Login
            </button>

        </div>

    </div>

    <!-- <script src="../comps/v10/index.js" type="module"></script> -->

    <script>
        window.ksShowLog = true;
        window.ksShowLogTree = {};
        window.ksShowLogTree.vertical = false;
        window.ksShowLogTree.htmlForm = false;

        window.ksShowLogTree.components = {};

        window.ksShowLogTree.components.main = false;

        window.ksShowLogTree.components.inputCore = false;
        window.ksShowLogTree.components.vertical = {};
        window.ksShowLogTree.components.vertical.htmlForm = false;

        let ksTable1;
        let ksTable2;
        let ksVertical;
    </script>

    <script type="module" src="./Index/start.js"></script>

</body>

</html>
